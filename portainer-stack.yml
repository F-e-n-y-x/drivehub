# DriveHub — Portainer stack (multi-backend backup/sync powered by rclone).
# Paste into Portainer: Stacks -> Add stack -> Web editor, edit the REPLACE_...
# values, then Deploy.
#
# Notes:
#  * The image must be PUBLIC on GHCR, or add a Registry (GitHub user + PAT) in
#    Portainer so it can pull a private image.
#  * Only TOKEN_ENCRYPTION_KEY and PUBLIC_URL are required. Storage backends are
#    added in the web UI. GOOGLE_* is only for one-click Google Drive sign-in.
#  * Set PUID/PGID to 0 to back up root-owned data (e.g. system AppData).
#  * TeraBox is built in (Add remote -> TeraBox -> cookie). To use AList/OpenList,
#    run your own AList server and Add remote -> AList / OpenList (WebDAV URL).

services:
  drivehub:
    image: ghcr.io/f-e-n-y-x/drivehub:latest
    container_name: drivehub
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # --- REQUIRED: encrypts stored credentials. openssl rand -base64 32
      TOKEN_ENCRYPTION_KEY: "REPLACE_WITH_RANDOM_32B_SECRET"
      # --- REQUIRED: the URL you open DriveHub at.
      PUBLIC_URL: "http://localhost:8080"
      # --- Permissions: 0 = run as root (read root-owned data, write DB) ---
      PUID: "0"
      PGID: "0"
      # --- OPTIONAL: one-click Google Drive (see SETUP.md). Redirect URI in
      #     Google = <PUBLIC_URL>/api/oauth/google/callback ---
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      # --- Optional tuning ---
      CONCURRENCY: "4"
      LOG_LEVEL: "info"
    volumes:
      # A local folder exposed as a "Local" remote (mount more for more sources).
      - /DATA/AppData:/data/sync
      # App data: SQLite DB, encrypted credentials, rclone.conf.
      # KEEP OUTSIDE the sync folder above.
      - /DATA/drivehub-app:/data/app
      # OPTIONAL: enable "quiesce containers during snapshot" for consistent
      # database backups (pauses chosen containers during the archive).
      # - /var/run/docker.sock:/var/run/docker.sock:ro
