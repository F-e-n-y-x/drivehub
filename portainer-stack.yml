# DriveHub — Portainer stack.
# Paste into Portainer: Stacks -> Add stack -> Web editor, then edit the
# REPLACE_... values and Deploy.
#
# Notes:
#  * The image must be PUBLIC on GHCR, or add a Registry (GitHub username + PAT)
#    in Portainer so it can pull a private image.
#  * PUBLIC_URL must match how you reach the app, and the Google OAuth client's
#    Authorized redirect URI must be <PUBLIC_URL>/api/auth/google/callback.
#  * Change the sync-folder host path to a real path on your Docker host.

services:
  drivehub:
    image: ghcr.io/f-e-n-y-x/drivehub:latest
    container_name: drivehub
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # --- REQUIRED: from your Google Cloud OAuth client (see SETUP.md) ---
      GOOGLE_CLIENT_ID: "REPLACE_WITH_CLIENT_ID.apps.googleusercontent.com"
      GOOGLE_CLIENT_SECRET: "REPLACE_WITH_CLIENT_SECRET"
      # --- REQUIRED: any long random secret. Generate: openssl rand -base64 32
      TOKEN_ENCRYPTION_KEY: "REPLACE_WITH_RANDOM_32B_SECRET"
      # --- REQUIRED: the URL you open DriveHub at. MUST match the Google
      #     redirect URI <PUBLIC_URL>/api/auth/google/callback ---
      PUBLIC_URL: "http://localhost:8080"
      # --- Permissions ---
      # The user the app runs as. To back up ROOT-OWNED data (e.g. system
      # AppData), set both to 0 so it can read everything and write its DB.
      # Otherwise set them to the uid:gid that owns your data.
      PUID: "0"
      PGID: "0"
      # --- Optional tuning ---
      POLL_INTERVAL_MS: "7000"
      CONCURRENCY: "4"
      DELETE_PROPAGATION: "true"
      LOG_LEVEL: "info"
    volumes:
      # The local folder to sync. Change the LEFT side to a real host path.
      - /opt/drivehub/sync-folder:/data/sync
      # App data (SQLite DB + encrypted tokens) — keep as a named volume.
      - drivehub-data:/data/app

volumes:
  drivehub-data:
