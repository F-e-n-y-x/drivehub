services:
  drivehub:
    # Use the published image, or build locally with `docker compose build`.
    image: ghcr.io/f-e-n-y-x/drivehub:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: drivehub
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional in-browser shell into the container (rclone config, debugging).
      # Off by default. Set "true" and it appears in the sidebar — opens inline
      # through the app, no extra port needed.
      ENABLE_TERMINAL: ${ENABLE_TERMINAL:-false}
      # --- Required ---
      # Encrypts stored remote credentials/tokens. Generate: openssl rand -base64 32
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      # Public URL the browser uses (must match any OAuth redirect host).
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      # --- Optional: only needed to connect Google Drive via one-click OAuth.
      #     All other backends (Local, S3, B2, Dropbox/OneDrive token, WebDAV,
      #     SFTP) are configured in the UI and need none of this.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # --- Permissions ---
      # User the app runs as. Set both to 0 to back up root-owned data (e.g.
      # system AppData); otherwise use the uid:gid that owns your folders.
      PUID: ${PUID:-10001}
      PGID: ${PGID:-10001}
      # --- Optional tuning ---
      CONCURRENCY: ${CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # A local folder offered as the default "Local" remote (add more in the UI
      # by mounting them, e.g. /mnt/photos:/data/sync/Photos).
      - ./sync-folder:/data/sync
      # Persistent app data: SQLite DB, encrypted credentials, rclone.conf.
      - ./app-data:/data/app
      # OPTIONAL: mount the Docker socket to enable "quiesce containers during
      # snapshot" (pauses chosen containers for DB-consistent backups).
      # - /var/run/docker.sock:/var/run/docker.sock:ro
